[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "mosaicfl"
version = "0.1.0"
description = "Mosaic-FL: Federated Trajectory Prediction and RAG-based Explanation for ClinicalPath"
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.10"
authors = [
    {name = "Jacqueline Abreu do N. T. R. Lopes", email = "abreujacline@gmail.com"}
]
keywords = [
    "federated-learning",
    "electronic-health-records",
    "clinical-decision-support",
    "retrieval-augmented-generation",
    "transformers",
    "healthcare-ai"
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "License :: OSI Approved :: MIT License",
    "Operating System :: OS Independent",
]

dependencies = [
    "torch>=2.0.0",
    "transformers>=4.30.0",
    "flwr>=1.5.0",
    "chromadb>=0.4.0",
    "sentence-transformers>=2.2.0",
    "pandas>=2.0.0",
    "numpy>=1.24.0",
    "scikit-learn>=1.3.0",
    "langchain>=0.1.0",
    "datasets>=2.14.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0.0",
    "black>=23.0.0",
    "ruff>=0.1.0",
    "jupyter>=1.0.0",
]
docs = [
    "sphinx>=7.0.0",
    "sphinx-rtd-theme>=1.3.0",
]

[project.urls]
Repository = "https://github.com/JacAbreu/mosaic-fl"
 
 
[tool.setuptools.packages.find]
where = ["src"]
 
[tool.black]
line-length = 100
target-version = ["py310"]
 
[tool.ruff]
line-length = 100
select = ["E", "F", "I", "W"]
 
[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
