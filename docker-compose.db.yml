services:
  db:
    image: timescale/timescaledb-ha:pg16
    container_name: mosaicfl-db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       mosaicfl
      POSTGRES_USER:     mosaicfl
      POSTGRES_PASSWORD: ${FL_DB_PASSWORD:?defina FL_DB_PASSWORD no .env}
    ports:
      - "${FL_DB_PORT:-5432}:5432"
    volumes:
      - db_data:/home/postgres/pgdata/data
      - ./scripts/db/init.sql:/docker-entrypoint-initdb.d/01_init.sql:ro
    shm_size: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mosaicfl -d mosaicfl"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
    driver: local
